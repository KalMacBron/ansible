---
- name: Check whether k3s binary already exists
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Read k3s node token if server already exists
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: existing_k3s_token_file
  when: k3s_binary.stat.exists

- name: Set existing k3s node token fact
  ansible.builtin.set_fact:
    k3s_node_token: "{{ existing_k3s_token_file.content | b64decode | trim }}"
  when: k3s_binary.stat.exists

- name: Ensure k3s server environment file exists
  ansible.builtin.copy:
    dest: /etc/systemd/system/k3s.service.env
    owner: root
    group: root
    mode: "0600"
    content: |
      INSTALL_K3S_VERSION='{{ k3s_version }}'
  notify: Restart k3s

- name: Install k3s server
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
    INSTALL_K3S_VERSION="{{ k3s_version }}" \
    sh -s - server \
      --write-kubeconfig-mode {{ k3s_write_kubeconfig_mode }} \
      --node-name {{ k3s_server_node_name }}
  args:
    creates: /usr/local/bin/k3s
  when: not k3s_binary.stat.exists

- name: Ensure k3s service is enabled and started
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    state: started
    daemon_reload: true
