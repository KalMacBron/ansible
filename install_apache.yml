---

- hosts: kraken
  become: true
  tasks:

  - name: update repository index
    apt:
      update_cache: yes
    when: ansible_facts["os_family"] == "Debian"
    
  - name: Install the apache2 package
    apt:
      name: apache2
      state: latest
    when: ansible_facts["os_family"] == "Debian"

  - name: install PHP support for apache
    apt: 
      name: libapache2-mod-php
      state: latest
    when: ansible_facts["os_family"] == "Debian"
